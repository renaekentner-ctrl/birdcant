<!DOCTYPE html>

  <style>
    body {
      background: #18181b;
      color: white;
      font-family: Arial, sans-serif;
      padding: 30px;
      max-width: 1150px;
      margin: auto;
    }

    h1 { font-size: 42px; margin-bottom: 5px; }
    h2 { margin-top: 0; }

    textarea, input, select {
      width: 100%;
      box-sizing: border-box;
      background: #27272a;
      color: white;
      border: 1px solid #52525b;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }

    textarea { height: 130px; }

    button {
      background: white;
      color: black;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 8px;
      font-size: 15px;
    }

    .box {
      background: #27272a;
      padding: 22px;
      border-radius: 14px;
      margin-top: 22px;
    }

    .entry {
      border-bottom: 1px solid #3f3f46;
      padding: 8px 0;
    }

    .cant {
      color: #facc15;
      font-weight: bold;
    }

    .small {
      color: #a1a1aa;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .pill {
      display: inline-block;
      background: #3f3f46;
      padding: 6px 10px;
      border-radius: 999px;
      margin: 3px;
      font-size: 13px;
      color: #e4e4e7;
    }
  </style>
</head>

<body>

<h1>🦆 Birdcant Translator</h1>
<p class="small">A secret bird-themed cant for Mallard and the flock.</p>

<div class="box">
  <h2>Translator</h2>

  <select id="mode">
    <option value="toCant">English → Birdcant</option>
    <option value="fromCant">Birdcant → English</option>
  </select>

  <textarea id="input" placeholder="Type a phrase..."></textarea>

  <button onclick="translateText()">Translate</button>
  <button onclick="randomPhrase()">Random Phrase</button>
  <button onclick="clearText()">Clear</button>

  <h2>Translation</h2>
  <div id="output" class="cant">Your translation will appear here...</div>
</div>

<div class="box">
  <h2>Dictionary Search</h2>
  <input id="search" placeholder="Search English or Birdcant..." oninput="loadDictionary()">

  <select id="categoryFilter" onchange="loadDictionary()">
    <option value="All">All Categories</option>
  </select>

  <div id="dictionary" class="grid"></div>
</div>

<div class="box">
  <h2>Quick Category Guide</h2>
  <div id="categoryPills"></div>
</div>

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function getDictionaryObject() {
  const dictionary = {};
  entries.forEach(([category, english, cant]) => {
    dictionary[english] = cant;
  });
  return dictionary;
}

function translateText() {
  let text = document.getElementById("input").value;
  const mode = document.getElementById("mode").value;
  let dictionary = getDictionaryObject();
  let pairs = Object.entries(dictionary);

  if (mode === "fromCant") {
    pairs = pairs.map(([english, cant]) => [cant, english]);
  }

  pairs.sort((a, b) => b[0].length - a[0].length);

  for (const [from, to] of pairs) {
    const regex = new RegExp("\\b" + escapeRegExp(from) + "\\b", "gi");
    text = text.replace(regex, to);
  }

  document.getElementById("output").innerText = text || "Your translation will appear here...";
}

function loadDictionary() {
  const search = document.getElementById("search").value.toLowerCase();
  const selectedCategory = document.getElementById("categoryFilter").value;
  let html = "";

  entries.forEach(([category, english, cant]) => {
    const matchesSearch =
      english.toLowerCase().includes(search) ||
      cant.toLowerCase().includes(search) ||
      category.toLowerCase().includes(search);

    const matchesCategory =
      selectedCategory === "All" || selectedCategory === category;

    if (matchesSearch && matchesCategory) {
      html += `
        <div class="entry">
          <div class="small">${category}</div>
          <b>${english}</b> → <span class="cant">${cant}</span>
        </div>
      `;
    }
  });

  document.getElementById("dictionary").innerHTML = html || "No results found.";
}

function randomPhrase() {
  const phrase = examples[Math.floor(Math.random() * examples.length)];
  document.getElementById("input").value = phrase;
  document.getElementById("mode").value = "toCant";
  translateText();
}

function clearText() {
  document.getElementById("input").value = "";
  document.getElementById("output").innerText = "Your translation will appear here...";
}

function loadCategories() {
  const categories = [...new Set(entries.map(entry => entry[0]))];
  const select = document.getElementById("categoryFilter");
  const pills = document.getElementById("categoryPills");

  categories.forEach(category => {
    const option = document.createElement("option");
    option.value = category;
    option.textContent = category;
    select.appendChild(option);

    const pill = document.createElement("span");
    pill.className = "pill";
    pill.textContent = category;
    pills.appendChild(pill);
  });
}

loadCategories();
loadDictionary();
